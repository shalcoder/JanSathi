openapi: 3.0.3
info:
  title: JanSathi Civic Upgrade API
  version: 1.0.0
  description: Contracts for life-event orchestration, proactive alerts, journey tracking, artifacts, and fraud signals.
paths:
  /v1/civic/life-event-cases:
    post:
      summary: Create a life-event case
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [session_id, event_key]
              properties:
                session_id:
                  type: string
                user_id:
                  type: string
                event_key:
                  type: string
                  enum: [crop_loss, child_birth, job_loss]
                language:
                  type: string
                  default: en
      responses:
        "201":
          description: Case created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LifeEventCase"

  /v1/civic/life-event-cases/{case_id}:
    get:
      summary: Get life-event case status
      parameters:
        - in: path
          name: case_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Current state and step list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LifeEventCase"

  /v1/civic/proactive-alerts:
    get:
      summary: Get latest proactive alerts for a user
      parameters:
        - in: query
          name: user_id
          schema:
            type: string
      responses:
        "200":
          description: Alerts list
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                  alerts:
                    type: array
                    items:
                      $ref: "#/components/schemas/ProactiveAlert"

  /v1/civic/artifacts:
    post:
      summary: Generate or refresh civic artifacts packet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [session_id, workflow]
              properties:
                session_id:
                  type: string
                workflow:
                  type: string
                language:
                  type: string
      responses:
        "200":
          description: Artifact packet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtifactPacket"

  /v1/civic/journey:
    get:
      summary: Get civic journey timeline
      parameters:
        - in: query
          name: user_id
          schema:
            type: string
        - in: query
          name: session_id
          schema:
            type: string
      responses:
        "200":
          description: Journey timeline
          content:
            application/json:
              schema:
                type: object
                properties:
                  journey:
                    type: array
                    items:
                      $ref: "#/components/schemas/JourneyEvent"

  /v1/civic/fraud-report:
    post:
      summary: Report middleman/fraud instance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [location, details]
              properties:
                location:
                  type: string
                details:
                  type: string
                amount:
                  type: number
                contact:
                  type: string
      responses:
        "201":
          description: Fraud report recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FraudReport"

components:
  schemas:
    LifeEventCase:
      type: object
      properties:
        case_id:
          type: string
        session_id:
          type: string
        user_id:
          type: string
        event_key:
          type: string
        event_label:
          type: string
        status:
          type: string
          enum: [queued, in_progress, completed, blocked]
        current_step:
          type: integer
        steps:
          type: array
          items:
            $ref: "#/components/schemas/LifeEventStep"
        suggested_schemes:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    LifeEventStep:
      type: object
      properties:
        step_id:
          type: string
        title:
          type: string
        service_key:
          type: string
        status:
          type: string
          enum: [pending, active, completed, blocked]
        reason:
          type: string
        eta_minutes:
          type: integer

    ProactiveAlert:
      type: object
      properties:
        id:
          type: string
        user_id:
          type: string
        scheme_id:
          type: string
        title:
          type: string
        message:
          type: string
        priority:
          type: string
          enum: [high, medium, low]
        channel:
          type: string
          enum: [sms, ivr, ivr+sms]
        reason_trace:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [generated, queued, sent, failed]

    ArtifactPacket:
      type: object
      properties:
        packet_id:
          type: string
        session_id:
          type: string
        workflow:
          type: string
        language:
          type: string
        artifacts:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                enum:
                  - benefit_receipt
                  - document_checklist
                  - application_packet
                  - complaint_letter
                  - appointment_slip
                  - office_visit_guide
              status:
                type: string
                enum: [generated, ready, failed]
              url:
                type: string

    JourneyEvent:
      type: object
      properties:
        stage:
          type: string
        status:
          type: string
          enum: [completed, in_progress, pending, blocked]
        updated_at:
          type: string
          format: date-time
        metadata:
          type: object
          additionalProperties: true

    FraudReport:
      type: object
      properties:
        report_id:
          type: string
        location:
          type: string
        details:
          type: string
        amount:
          type: number
        signal_severity:
          type: string
          enum: [low, medium, high]
        created_at:
          type: string
          format: date-time
